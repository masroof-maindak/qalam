name: Publish to Cargo

# Auto-generates Git tags corresponding to changes in Cargo.toml, and publishes
# to crates.io

on:
  workflow_dispatch:
  push:
    paths:
      - "Cargo.toml"
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
